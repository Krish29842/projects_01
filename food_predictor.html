<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Donation Predictor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container { background: #fff; border-radius: 16px; padding: 32px 28px; max-width: 420px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  h1 { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
  select, input[type="date"] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111; font-size: 15px; font-family: inherit; outline: none; -webkit-appearance: none; appearance: none; }
  select:focus, input[type="date"]:focus { border-color: #111; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #111; color: #fff; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; margin-top: 4px; }
  .btn:hover { background: #333; }
  .result { margin-top: 20px; background: #f8f8f8; border-radius: 12px; padding: 24px 20px 20px; text-align: center; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .meta { font-size: 13px; color: #888; margin-bottom: 12px; }
  .big { font-size: 56px; font-weight: 600; line-height: 1; color: #111; letter-spacing: -0.03em; }
  .unit { font-size: 17px; color: #666; margin-top: 5px; }
  .rng { font-size: 12px; color: #aaa; margin-top: 5px; }
  .divider { border: none; border-top: 1px solid #e8e8e8; margin: 16px 0; }
  .stats-row { display: flex; justify-content: center; }
  .stat { flex: 1; text-align: center; padding: 0 8px; }
  .stat + .stat { border-left: 1px solid #e8e8e8; }
  .sv { font-size: 20px; font-weight: 600; color: #111; }
  .sl { font-size: 11px; color: #aaa; margin-top: 3px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin: 0 2px; }
  .bf { background: #fff3cd; color: #856404; }
  .bw { background: #dbeafe; color: #1e40af; }
  .err { color: #dc2626; font-size: 13px; text-align: center; padding: 8px 0; margin-top: 8px; }
  .foot { font-size: 11px; color: #aaa; text-align: center; margin-top: 10px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <h1>Food Donation Predictor</h1>
  <p class="subtitle">Trained on 600 records (2022–2024) from your dataset</p>

  <div class="field">
    <label for="sh">Shelter</label>
    <select id="sh">
      <option value="">Select shelter…</option>
      <option>Aashraya Shelter</option>
      <option>Annapurna Shelter</option>
      <option>Asha Griha</option>
      <option>Daya Niwas</option>
      <option>Jeevan Kendra</option>
      <option>Karuna Ashram</option>
      <option>Prerna Niwas</option>
      <option>Sahara Home</option>
      <option>Seva Sadan</option>
      <option>Umeed Niwas</option>
    </select>
  </div>

  <div class="field">
    <label for="dt">Date</label>
    <input type="date" id="dt" />
  </div>

  <button class="btn" onclick="run()">Predict</button>
  <div id="out"></div>
</div>

<script>
// ─── DATA: Per-shelter per-month stats from food_donation_dataset_v2.csv ──────
// Each entry: { fpp: food-per-person (kg), m: { month: { u: mean_people, s: std_people } } }
const D = {
  "Aashraya Shelter": {
    fpp: 0.2183,
    m: {
      1:{u:923.7,s:917.1}, 2:{u:657.7,s:421.0}, 3:{u:692.2,s:608.6},
      4:{u:1077.0,s:468.2}, 5:{u:474.0,s:282.8}, 6:{u:711.5,s:414.9},
      7:{u:685.2,s:435.0}, 8:{u:1021.6,s:669.0}, 9:{u:1013.4,s:779.3},
      10:{u:1563.8,s:391.7}, 11:{u:836.6,s:536.9}, 12:{u:1174.2,s:967.6}
    }
  },
  "Annapurna Shelter": {
    fpp: 0.2105,
    m: {
      1:{u:712.5,s:681.8}, 2:{u:975.3,s:356.0}, 3:{u:1179.4,s:642.1},
      4:{u:2750.0,s:1650.0}, 5:{u:1185.0,s:811.3}, 6:{u:770.3,s:333.6},
      7:{u:1283.5,s:713.8}, 8:{u:946.2,s:453.4}, 9:{u:1557.0,s:934.2},
      10:{u:905.8,s:610.3}, 11:{u:890.3,s:96.2}, 12:{u:959.9,s:737.5}
    }
  },
  "Asha Griha": {
    fpp: 0.2149,
    m: {
      1:{u:1897.8,s:728.2}, 2:{u:1314.3,s:807.9}, 3:{u:735.1,s:444.6},
      4:{u:1174.0,s:923.6}, 5:{u:666.5,s:354.5}, 6:{u:714.2,s:812.2},
      7:{u:516.0,s:316.2}, 8:{u:1139.5,s:553.4}, 9:{u:715.9,s:299.0},
      10:{u:1437.7,s:555.6}, 11:{u:1295.2,s:739.5}, 12:{u:1081.0,s:315.1}
    }
  },
  "Daya Niwas": {
    fpp: 0.2205,
    m: {
      1:{u:1680.8,s:1409.9}, 2:{u:785.6,s:419.8}, 3:{u:479.0,s:350.7},
      4:{u:1647.2,s:1127.4}, 5:{u:595.0,s:357.0}, 6:{u:838.0,s:251.9},
      7:{u:808.7,s:567.8}, 8:{u:716.3,s:719.3}, 9:{u:940.6,s:653.4},
      10:{u:1474.5,s:799.2}, 11:{u:1061.0,s:672.7}, 12:{u:583.2,s:404.7}
    }
  },
  "Jeevan Kendra": {
    fpp: 0.2173,
    m: {
      1:{u:1740.7,s:1771.3}, 2:{u:1137.0,s:780.4}, 3:{u:1088.0,s:596.4},
      4:{u:1269.1,s:949.3}, 5:{u:787.3,s:562.7}, 6:{u:489.0,s:358.9},
      7:{u:701.3,s:540.2}, 8:{u:1090.6,s:801.2}, 9:{u:891.0,s:567.1},
      10:{u:1409.5,s:1118.4}, 11:{u:1379.1,s:451.2}, 12:{u:1058.2,s:595.6}
    }
  },
  "Karuna Ashram": {
    fpp: 0.2180,
    m: {
      1:{u:1773.6,s:1461.1}, 2:{u:1484.3,s:513.2}, 3:{u:1220.3,s:1039.0},
      4:{u:839.8,s:503.3}, 5:{u:534.9,s:295.3}, 6:{u:724.4,s:510.7},
      7:{u:665.0,s:737.2}, 8:{u:1268.0,s:988.7}, 9:{u:1078.0,s:667.9},
      10:{u:817.0,s:472.6}, 11:{u:1417.0,s:802.6}, 12:{u:1755.6,s:1012.6}
    }
  },
  "Prerna Niwas": {
    fpp: 0.2186,
    m: {
      1:{u:1330.1,s:936.5}, 2:{u:1223.7,s:543.8}, 3:{u:1087.5,s:741.7},
      4:{u:934.6,s:407.8}, 5:{u:849.4,s:458.8}, 6:{u:924.0,s:547.7},
      7:{u:549.5,s:460.7}, 8:{u:979.0,s:575.7}, 9:{u:1130.3,s:1177.3},
      10:{u:1429.5,s:638.1}, 11:{u:1515.3,s:1064.1}, 12:{u:1311.1,s:560.9}
    }
  },
  "Sahara Home": {
    fpp: 0.2195,
    m: {
      1:{u:601.4,s:359.1}, 2:{u:945.1,s:480.1}, 3:{u:1184.5,s:814.8},
      4:{u:1006.8,s:591.2}, 5:{u:749.4,s:479.3}, 6:{u:1105.8,s:187.4},
      7:{u:496.0,s:357.6}, 8:{u:421.0,s:252.6}, 9:{u:821.4,s:673.9},
      10:{u:1178.5,s:623.7}, 11:{u:1363.7,s:968.5}, 12:{u:1529.3,s:934.0}
    }
  },
  "Seva Sadan": {
    fpp: 0.2136,
    m: {
      1:{u:1357.7,s:1219.8}, 2:{u:1882.8,s:1105.7}, 3:{u:1145.8,s:1217.5},
      4:{u:520.3,s:310.0}, 5:{u:822.0,s:493.2}, 6:{u:490.6,s:427.0},
      7:{u:574.8,s:172.7}, 8:{u:959.0,s:512.0}, 9:{u:1024.8,s:597.3},
      10:{u:1172.0,s:378.0}, 11:{u:808.8,s:620.4}, 12:{u:743.7,s:624.7}
    }
  },
  "Umeed Niwas": {
    fpp: 0.2145,
    m: {
      1:{u:1665.6,s:1093.8}, 2:{u:1266.3,s:914.3}, 3:{u:355.0,s:213.0},
      4:{u:1641.2,s:967.3}, 5:{u:851.9,s:731.9}, 6:{u:1454.4,s:478.6},
      7:{u:669.0,s:401.4}, 8:{u:1500.8,s:1172.2}, 9:{u:1214.2,s:661.0},
      10:{u:686.2,s:297.8}, 11:{u:928.5,s:785.6}, 12:{u:1474.0,s:1027.3}
    }
  }
};

// Multipliers derived from dataset regression
const WE_MULT   = 1.219;  // weekend vs weekday
const FEST_MULT = 1.666;  // festival day vs non-festival

// Known major Indian festival / national holiday dates (MM-DD)
const FESTIVALS = new Set([
  "01-14","01-15","01-26",  // Makar Sankranti, Republic Day
  "03-25","03-26",           // Holi
  "04-14",                   // Ambedkar Jayanti / Baisakhi
  "08-15",                   // Independence Day
  "10-02",                   // Gandhi Jayanti
  "10-12","10-23","10-24",   // Dussehra / Diwali region
  "11-01","11-12","11-15",   // Regional / Diwali
  "12-25"                    // Christmas
]);

const MONTHS = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function isFestival(m, d) {
  return FESTIVALS.has(String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0'));
}

function getSeason(m) {
  if ([12,1,2].includes(m))  return 'Winter';
  if ([3,4,5].includes(m))   return 'Summer';
  if ([6,7,8,9].includes(m)) return 'Monsoon';
  return 'Post-Monsoon';
}

// Set today's date as default
document.getElementById('dt').value = new Date().toISOString().slice(0,10);

function run() {
  const shelter = document.getElementById('sh').value;
  const dateVal = document.getElementById('dt').value;
  const out     = document.getElementById('out');

  if (!shelter) { out.innerHTML = '<div class="err">Please select a shelter.</div>'; return; }
  if (!dateVal) { out.innerHTML = '<div class="err">Please enter a date.</div>'; return; }

  const s      = D[shelter];
  const dt     = new Date(dateVal + 'T12:00:00');
  const month  = dt.getMonth() + 1;
  const day    = dt.getDate();
  const wd     = dt.getDay();
  const isWE   = wd === 0 || wd === 6;
  const isFest = isFestival(month, day);

  // Base estimate from historical shelter+month average
  const base   = s.m[month];
  let people   = base.u;
  if (isWE)   people *= WE_MULT;
  if (isFest) people *= FEST_MULT;
  people = Math.round(people);

  // Confidence range using historical std dev
  let lowP  = Math.max(0, Math.round(base.u - base.s));
  let highP = Math.round(base.u + base.s);
  if (isWE)   { lowP = Math.round(lowP * WE_MULT);   highP = Math.round(highP * WE_MULT); }
  if (isFest) { lowP = Math.round(lowP * FEST_MULT); highP = Math.round(highP * FEST_MULT); }

  // Food calculation (food per person is stable ~0.21-0.22 kg across dataset)
  const fpp   = s.fpp;
  const food  = (people * fpp).toFixed(1);
  const lowF  = (lowP  * fpp).toFixed(1);
  const highF = (highP * fpp).toFixed(1);
  const packs = Math.ceil(food / 0.5);

  const dayName   = dt.toLocaleDateString('en-IN', { weekday: 'long' });
  const dateLabel = dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

  const badges = [
    isFest ? '<span class="badge bf">festival day</span>' : '',
    isWE   ? '<span class="badge bw">weekend</span>'     : ''
  ].filter(Boolean).join('');

  out.innerHTML = `
    <div class="result">
      <div class="meta">${shelter} &middot; ${dateLabel}, ${dayName} ${badges}</div>
      <div class="big">${Number(people).toLocaleString('en-IN')}</div>
      <div class="unit">people expected</div>
      <div class="rng">range: ${lowP.toLocaleString('en-IN')} – ${highP.toLocaleString('en-IN')}</div>
      <hr class="divider">
      <div class="stats-row">
        <div class="stat">
          <div class="sv">${food} kg</div>
          <div class="sl">food needed</div>
        </div>
        <div class="stat">
          <div class="sv">${lowF}–${highF}</div>
          <div class="sl">kg range</div>
        </div>
        <div class="stat">
          <div class="sv">${packs}</div>
          <div class="sl">500g packs</div>
        </div>
      </div>
    </div>
    <div class="foot">
      Based on ${MONTHS[month]} historical avg for ${shelter} &middot; ${getSeason(month)} season<br>
      ${isFest ? 'Festival day: +67% uplift applied. ' : ''}${isWE ? 'Weekend: +22% uplift applied.' : ''}
    </div>`;
}
</script>
</body>
</html>
