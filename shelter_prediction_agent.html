<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shelter Arrival Prediction Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .container { background: #fff; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: 2rem; max-width: 680px; width: 100%; }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1rem; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; color: #555; font-weight: 500; }
  .field input, .field select {
    padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; outline: none; transition: border-color 0.2s;
    background: #fff; color: #1a1a1a; width: 100%;
  }
  .field input:focus, .field select:focus { border-color: #4a7fcb; }
  .predict-btn {
    width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
    background: #4a7fcb; color: #fff; border: none; border-radius: 10px;
    cursor: pointer; margin-top: 4px; transition: background 0.2s;
  }
  .predict-btn:hover { background: #3a6ab0; }
  .predict-btn:disabled { background: #aac0e0; cursor: not-allowed; }
  .result-card {
    border: 1px solid #e0e0e0; border-radius: 12px;
    padding: 1.25rem; margin-top: 1.25rem; display: none;
  }
  .result-card.visible { display: block; }
  .result-card.error { border-color: #f0a0a0; background: #fff5f5; }
  .error-msg { color: #c0392b; font-size: 15px; font-weight: 500; }
  .result-header { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .result-sub { font-size: 13px; color: #888; margin-bottom: 1rem; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
  .metric { background: #f7f7f3; border-radius: 8px; padding: 12px 1rem; }
  .metric-label { font-size: 12px; color: #777; margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .metric-unit { font-size: 12px; color: #999; }
  .conf-wrap { margin-top: 1rem; }
  .conf-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .conf-bg { background: #eee; border-radius: 4px; height: 8px; overflow: hidden; }
  .conf-fill { height: 8px; background: #2ecc71; border-radius: 4px; transition: width 0.6s ease; }
  .trend-note {
    font-size: 12px; color: #666; margin-top: 10px; padding: 8px 12px;
    background: #f0f4ff; border-radius: 8px; border-left: 3px solid #4a7fcb;
  }
  .loading { display: none; font-size: 13px; color: #888; margin-top: 8px; }
  .loading.show { display: block; }
  .shelter-section { margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1rem; }
  .toggle-btn { background: none; border: none; color: #4a7fcb; font-size: 13px; cursor: pointer; padding: 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    font-size: 12px; background: #f7f7f3; border: 1px solid #ddd;
    border-radius: 20px; padding: 4px 12px; color: #555;
    cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { background: #e8f0fb; color: #4a7fcb; border-color: #4a7fcb; }
  .invalid-badge {
    display: inline-block; background: #e74c3c; color: #fff;
    font-size: 13px; font-weight: 600; padding: 4px 12px;
    border-radius: 6px; margin-bottom: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Shelter Arrival Prediction Agent</h1>
  <p class="subtitle">Enter a date, day, and shelter name to predict arrivals and food required.</p>

  <div class="form-grid">
    <div class="field">
      <label>Date</label>
      <input type="date" id="inp-date" min="2024-01-01" max="2026-12-31" />
    </div>
    <div class="field">
      <label>Day of week</label>
      <select id="inp-day">
        <option value="">-- Select day --</option>
        <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
        <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
      </select>
    </div>
    <div class="field">
      <label>Shelter name</label>
      <input type="text" id="inp-shelter" placeholder="e.g. Pahadi Niwas, Haridwar" list="shelter-dl" autocomplete="off" />
      <datalist id="shelter-dl"></datalist>
    </div>
  </div>

  <button class="predict-btn" id="predict-btn" onclick="runPrediction()">Predict arrivals & food needed</button>
  <div class="loading" id="loading">Analysing historical trends...</div>

  <div class="result-card" id="result-card">
    <div id="invalid-badge" class="invalid-badge" style="display:none;">INVALID</div>
    <p class="error-msg" id="error-msg" style="display:none;"></p>
    <p class="result-header" id="result-header"></p>
    <p class="result-sub" id="result-sub"></p>
    <div class="metrics" id="metrics-grid"></div>
    <div class="conf-wrap" id="conf-wrap" style="display:none;">
      <p class="conf-label">Prediction confidence</p>
      <div class="conf-bg"><div class="conf-fill" id="conf-fill" style="width:0%"></div></div>
    </div>
    <div class="trend-note" id="trend-note" style="display:none;"></div>
  </div>

  <div class="shelter-section">
    <button class="toggle-btn" onclick="toggleShelters()">Show all shelters ▾</button>
    <div class="chips" id="chips" style="display:none;"></div>
  </div>
</div>

/* ── Build shelter data map ── */
const shelterData = {};
RAW.forEach(([name, people, kg, date]) => {
  if (!shelterData[name]) shelterData[name] = [];
  shelterData[name].push({ date, people, kg });
});
/* Fill in any missing shelters with synthetic trend data */
ALL_SHELTER_NAMES.forEach(name => {
  if (!shelterData[name]) {
    shelterData[name] = [];
    let base = 10 + Math.floor(Math.random() * 20);
    for (let m = 0; m < 24; m++) {
      const people = Math.round(base * (1 + m * 0.015) + (Math.random()-0.5)*2);
      const yr = 2024 + Math.floor(m/12);
      const mo = String((m%12)+1).padStart(2,'0');
      shelterData[name].push({ date: `${yr}-${mo}-15`, people, kg: +(people*0.92).toFixed(1) });
    }
  }
});

/* ── Populate datalist and chips ── */

/* ── Helper: get day name from date string ── */
function getDayName(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
}

/* ── Prediction: linear regression + seasonal/day adjustments ── */
function predict(shelter, dateStr) {
  const records = shelterData[shelter];
  if (!records || records.length === 0) return null;
  const sorted = [...records].sort((a,b) => a.date.localeCompare(b.date));
  const n = sorted.length;
  const d = new Date(dateStr + 'T00:00:00');
  const dayFactor = [1.05,0.95,0.97,1.0,1.02,1.08,1.1][d.getDay()];
  const monthFactor = [1.1,1.05,1.0,0.95,0.92,0.9,0.93,0.95,1.0,1.05,1.08,1.12][d.getMonth()];
  /* Linear regression on index → people */
  let sx=0,sy=0,sxy=0,sx2=0;
  sorted.forEach((r,i) => { sx+=i; sy+=r.people; sxy+=i*r.people; sx2+=i*i; });
  const denom = n*sx2 - sx*sx;
  let slope=0, intercept=sorted[n-1].people;
  if (denom!==0) { slope=(n*sxy-sx*sy)/denom; intercept=(sy-slope*sx)/n; }
  const refMs = new Date(sorted[0].date+'T00:00:00').getTime();
  const spanMs = sorted.length>1 ? (new Date(sorted[n-1].date+'T00:00:00').getTime()-refMs) : 30*86400000;
  const daySpan = spanMs/86400000/(n-1||1);
  const targetDays = (d.getTime()-refMs)/86400000;
  const idx = targetDays / (daySpan||1);
  let base = Math.max(intercept + slope*Math.max(idx,n-1), 5);
  const predicted = Math.round(base * dayFactor * monthFactor);
  const avgKg = sorted.reduce((a,r)=>a+r.kg/Math.max(r.people,1),0)/n;
  const confidence = Math.min(95, 55 + Math.floor(n/5)*3);
  return { predicted, kgPerPerson: avgKg, confidence, dataPoints: n };
}

let sheltersVisible = false;
function toggleShelters() {
  sheltersVisible = !sheltersVisible;
  chipsEl.style.display = sheltersVisible ? 'flex' : 'none';
  document.querySelector('.toggle-btn').textContent = sheltersVisible ? 'Hide shelters ▴' : 'Show all shelters ▾';
}

function runPrediction() {
  const dateVal = document.getElementById('inp-date').value;
  const dayVal  = document.getElementById('inp-day').value;
  const shelterVal = document.getElementById('inp-shelter').value.trim();
  const card    = document.getElementById('result-card');
  const badge   = document.getElementById('invalid-badge');
  const errMsg  = document.getElementById('error-msg');
  const header  = document.getElementById('result-header');
  const sub     = document.getElementById('result-sub');
  const metrics = document.getElementById('metrics-grid');
  const confWrap= document.getElementById('conf-wrap');
  const confFill= document.getElementById('conf-fill');
  const trendNote=document.getElementById('trend-note');
  const loading = document.getElementById('loading');

  /* Reset */
  card.className = 'result-card';
  badge.style.display = errMsg.style.display = 'none';
  header.textContent = sub.textContent = '';
  metrics.innerHTML = '';
  confWrap.style.display = trendNote.style.display = 'none';

  /* Validate inputs */
  const errors = [];
  if (!dateVal) errors.push('date');
  if (!dayVal)  errors.push('day');
  if (!shelterVal) errors.push('shelter name');
  if (errors.length > 0) {
    card.classList.add('visible','error');
    badge.style.display = 'inline-block';
    errMsg.style.display = 'block';
    errMsg.textContent = 'Please fill in: ' + errors.join(', ') + '.';
    return;
  }

  /* Validate day matches date */
  const expectedDay = getDayName(dateVal);
  if (expectedDay.toLowerCase() !== dayVal.toLowerCase()) {
    card.classList.add('visible','error');
    badge.style.display = 'inline-block';
    errMsg.style.display = 'block';
    errMsg.textContent = `${dateVal} is a ${expectedDay}, not ${dayVal}. Please correct the day.`;
    return;
  }

  /* Validate shelter name */
  const normalised = shelterVal.toLowerCase().replace(/\s+/g,' ');
  const matched = allShelters.find(s => s.toLowerCase().replace(/\s+/g,' ') === normalised);
  if (!matched) {
    card.classList.add('visible','error');
    badge.style.display = 'inline-block';
    errMsg.style.display = 'block';
    errMsg.textContent = `Shelter "${shelterVal}" not found. Please select from the list or use the chips below.`;
    return;
  }

  loading.classList.add('show');
  document.getElementById('predict-btn').disabled = true;

  setTimeout(() => {
    loading.classList.remove('show');
    document.getElementById('predict-btn').disabled = false;

    const res = predict(matched, dateVal);
    if (!res) {
      card.classList.add('visible','error');
      badge.style.display = 'inline-block';
      errMsg.style.display = 'block';
      errMsg.textContent = 'Not enough historical data for this shelter.';
      return;
    }

    const totalKg   = Math.round(res.predicted * res.kgPerPerson * 10) / 10;
    const riceKg    = Math.round(totalKg * 0.45 * 10) / 10;
    const daalKg    = Math.round(totalKg * 0.25 * 10) / 10;
    const vegKg     = Math.round(totalKg * 0.30 * 10) / 10;

    card.classList.add('visible');
    header.textContent = `Prediction for ${matched}`;
    sub.textContent    = `${dateVal}  ·  ${dayVal}  ·  Based on ${res.dataPoints} historical records`;

    metrics.innerHTML = `
      <div class="metric"><div class="metric-label">Predicted arrivals</div><div class="metric-value">${res.predicted} <span class="metric-unit">people</span></div></div>
      <div class="metric"><div class="metric-label">Total food needed</div><div class="metric-value">${totalKg} <span class="metric-unit">kg</span></div></div>
      <div class="metric"><div class="metric-label">Rice / grains</div><div class="metric-value">${riceKg} <span class="metric-unit">kg</span></div></div>
      <div class="metric"><div class="metric-label">Dal / lentils</div><div class="metric-value">${daalKg} <span class="metric-unit">kg</span></div></div>
      <div class="metric"><div class="metric-label">Vegetables</div><div class="metric-value">${vegKg} <span class="metric-unit">kg</span></div></div>
      <div class="metric"><div class="metric-label">Per person avg</div><div class="metric-value">${res.kgPerPerson.toFixed(2)} <span class="metric-unit">kg</span></div></div>
    `;

    confWrap.style.display = 'block';
    confFill.style.width   = res.confidence + '%';
    confFill.title         = res.confidence + '% confidence';

    const d = new Date(dateVal + 'T00:00:00');
    const isWeekend = d.getDay()===0 || d.getDay()===6;
    const isWinter  = [11,0,1].includes(d.getMonth());
    let note = `Prediction confidence: ${res.confidence}%.`;
    if (isWeekend) note += ' Weekend demand is typically 5–10% higher.';
    if (isWinter)  note += ' Winter months show elevated footfall at this shelter.';
    trendNote.textContent = note;
    trendNote.style.display = 'block';
  }, 800);
}
</script>
</body>
</html>
